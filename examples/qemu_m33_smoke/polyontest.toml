# QEMU Cortex-M33 smoke (v1 on-target path)
#
# Build:
#   cmake -S examples/qemu_m33_smoke -B build/qemu_m33 \
#     -DCMAKE_TOOLCHAIN_FILE=$PWD/examples/qemu_m33_smoke/toolchain-arm-none-eabi.cmake
#   cmake --build build/qemu_m33
#
# Run via CLI (from repo root):
#   cargo run -p polyontest -- run --target qemu_m33 \
#     --config examples/qemu_m33_smoke/polyontest.toml

[target.qemu_m33]
board = "qemu_m33"
transport = "uart"
codec = "cobs"
extension = "core_stream"
mode = "stream"
reporters = ["console", "junit", "json"]
binary = "build/qemu_m33/qemu_m33_tests.elf"
timeout_ms = 15000
build = "cmake -S examples/qemu_m33_smoke -B build/qemu_m33 -DCMAKE_TOOLCHAIN_FILE=$PWD/examples/qemu_m33_smoke/toolchain-arm-none-eabi.cmake -DPOLYONTEST_PROFILE=small && cmake --build build/qemu_m33"
