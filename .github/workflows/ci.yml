name: ci

on:
  push:
  pull_request:

jobs:
  host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Amalgamate
        run: python3 scripts/amalgamate.py
      - name: Build CLI
        run: cargo build -p polyontest
      - name: Test Rust workspace
        run: cargo test --workspace
      - name: Configure host C (text)
        run: cmake -S examples/host_c -B build/host_c_text -DPOLYONTEST_MINIMAL_PRINT=ON -DPOLYONTEST_PROFILE=full
      - name: Build host C (text)
        run: cmake --build build/host_c_text
      - name: Run host C (text)
        run: ./build/host_c_text/host_c_tests
      - name: Configure host C (tiny)
        run: cmake -S examples/host_c -B build/host_tiny -DPOLYONTEST_PROFILE=tiny -DPOLYONTEST_MINIMAL_PRINT=ON
      - name: Build host C (tiny)
        run: cmake --build build/host_tiny
      - name: Run host C (tiny)
        run: ./build/host_tiny/host_c_tests
      - name: Configure host FFF
        run: cmake -S examples/host_fff -B build/host_fff
      - name: Build host FFF
        run: cmake --build build/host_fff
      - name: Run host FFF
        run: ./build/host_fff/host_fff_tests
      - name: Configure host C (COBS)
        run: cmake -S examples/host_c -B build/host_c -DPOLYONTEST_MINIMAL_PRINT=OFF -DPOLYONTEST_PROFILE=full
      - name: Build host C (COBS)
        run: cmake --build build/host_c
      - name: Run via polyontest CLI
        run: cargo run -p polyontest -- run --target host --config examples/host_c/polyontest.toml
      - name: Run via polyontest CLI (tag filter)
        run: cargo run -p polyontest -- run --target host --config examples/host_c/polyontest.toml --tag smoke
      - name: Configure host C++
        run: cmake -S examples/host_cpp -B build/host_cpp -DPOLYONTEST_MINIMAL_PRINT=ON -DPOLYONTEST_PROFILE=full
      - name: Build host C++
        run: cmake --build build/host_cpp
      - name: Run host C++
        run: ./build/host_cpp/host_cpp_tests
      - name: Build host Rust
        run: cargo build -p polyontest-host-rust
      - name: Run host Rust
        run: cargo run -p polyontest-host-rust
      - name: Build host Rust (COBS)
        run: cargo build -p polyontest-host-rust --no-default-features --features cobs
      - name: Run host Rust via CLI
        run: |
          BIN_DIR=$(cargo metadata --format-version 1 --no-deps | python3 -c "import json,sys; print(json.load(sys.stdin)['target_directory'])")
          SRC="${BIN_DIR}/debug/host_rust_tests"
          DST="target/debug/host_rust_tests"
          mkdir -p target/debug
          # When CARGO_TARGET_DIR is the default ./target, SRC and DST are the same file.
          if [ "$(realpath "$SRC")" != "$(realpath -m "$DST")" ]; then
            cp "$SRC" "$DST"
          fi
          test -x "$DST"
          cargo run -p polyontest -- run --target host --config examples/host_rust/polyontest.toml
      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports
          path: |
            report.xml
            report.json

  qemu-m33:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install toolchain
        run: |
          sudo apt-get update
          # build-essential provides make, required by CMake's Unix Makefiles generator
          sudo apt-get install -y gcc-arm-none-eabi qemu-system-arm cmake build-essential
      - name: Build CLI
        run: cargo build -p polyontest
      - name: Build and run QEMU M33 smoke
        run: cargo run -p polyontest -- run --target qemu_m33 --config examples/qemu_m33_smoke/polyontest.toml
      - name: Upload QEMU reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qemu-reports
          path: |
            report.xml
            report.json
